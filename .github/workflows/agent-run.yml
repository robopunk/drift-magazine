name: Drift Agent — Bi-weekly Research Run

on:
  # schedule disabled — manual runs only to control API costs
  workflow_dispatch:
    inputs:
      company_id:
        description: "Required: Run for a specific company ID"
        required: true
        type: string

jobs:
  research-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TARGET_COMPANY_ID: ${{ github.event.inputs.company_id }}
        run: |
          python backend/agent.py --company-id "$TARGET_COMPANY_ID"
